<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>어쩌다 스크린 골프 모임</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f6f8; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2, h3 { margin-top: 0; color: #1a365d; text-align: center; }
        .form-group { margin-bottom: 15px; }
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px 5px; border-bottom: 1px solid #eee; text-align: center; vertical-align: middle; }
        th { background-color: #f8fafc; font-weight: bold; color: #4a5568; font-size: 13px; }
        .summary-box { margin-top: 15px; padding: 10px; background-color: #ebf8ff; border-radius: 8px; text-align: center; font-weight: bold; color: #2b6cb0; font-size: 14px; }
        .loading { text-align: center; color: #666; font-size: 14px; padding: 20px; }
        .sub-text { font-size: 11px; color: #666; font-weight: normal; }
        .badge { display: inline-flex; justify-content: center; align-items: center; width: 28px; height: 28px; border-radius: 50%; font-weight: 900; font-size: 14px; color: white; text-shadow: 1px 1px 1px rgba(0,0,0,0.3); }
        .badge-1 { background: linear-gradient(135deg, #FFD700, #FDB931); border: 2px solid #DAA520; width: 32px; height: 32px; font-size: 16px; }
        .badge-2 { background: linear-gradient(135deg, #E0E0E0, #BDBDBD); border: 2px solid #9E9E9E; }
        .badge-3 { background: linear-gradient(135deg, #CD7F32, #A0522D); border: 2px solid #8B4513; }
        .badge-normal { background: #f1f5f9; color: #64748b; font-weight: bold; }
        .prize-card { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); border: 1px solid #fde68a; }
        .prize-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: white; border-radius: 8px; margin-bottom: 5px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card prize-card" id="prizeSection" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0;">💰 최근 상금전 결과</h3>
            <select id="feeSelect" style="width: auto; padding: 5px; border-radius: 6px;" onchange="updateFee()">
                <option value="5000">참가비 5천원</option>
                <option value="10000" selected>참가비 1만원</option>
            </select>
        </div>
        <div id="prizeWinners"></div>
    </div>
    <div class="card">
        <h2>🏆 어쩌다 스크린 골프 랭킹</h2>
        <table id="rankingTable"><thead><tr><th>순위</th><th>이름</th><th>평균(핸디)</th><th>누적 수상</th></tr></thead><tbody></tbody></table>
    </div>
    <div class="card">
        <h3>🔍 상세 기록</h3>
        <select id="historyNameSelect" onchange="renderUserHistory()"><option value="">멤버 선택</option></select>
        <div id="historyContent" style="display:none;"><div id="historySummary" class="summary-box"></div><table id="historyTable"><thead><tr><th>날짜</th><th>오버파</th><th>타수</th></tr></thead><tbody></tbody></table></div>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPc5vmxIbF91Tq-sHJU0OAm52uM5gezsNv2iUyU_776aEwnZjYakpbhn8hHl696Q19EiD8CD0xvPYu/pub?output=csv';
    let records = [], globalStats = {}, selectedFee = 10000;

    async function fetchData() {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        const lines = text.split('\n');
        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            if (cols.length < 3) continue;
            // ★ 중요: 날짜(0), 이름(1), 타수(2) 순서대로 정확히 파싱
            records.push({ date: cols[0].trim(), name: cols[1].trim(), totalScore: parseInt(cols[2]), overPar: parseInt(cols[2]) - 72, prizeJoin: '참여' });
        }
        processStats(); renderUI();
    }

    function processStats() {
        globalStats = {};
        records.forEach(r => {
            if (!globalStats[r.name]) globalStats[r.name] = { total: 0, count: 0, history: [] };
            globalStats[r.name].total += r.totalScore;
            globalStats[r.name].count += 1;
            globalStats[r.name].history.push(r);
        });
        Object.keys(globalStats).forEach(n => {
            globalStats[n].avg = Math.round(globalStats[n].total / globalStats[n].count);
            globalStats[n].handi = Math.round((globalStats[n].avg - 72) * 0.7);
        });
    }

    function updateFee() { selectedFee = parseInt(document.getElementById('feeSelect').value); renderUI(); }

    function renderUI() {
        // 랭킹 테이블 렌더링
        const tbody = document.querySelector('#rankingTable tbody');
        tbody.innerHTML = Object.keys(globalStats).sort((a,b) => globalStats[a].avg - globalStats[b].avg).map((n, i) => 
            `<tr><td>${i+1}</td><td>${n}</td><td>${globalStats[n].avg}타(${globalStats[n].handi})</td><td>-</td></tr>`).join('');
        
        // 상금전 렌더링
        const latest = records.filter(r => r.date === records[records.length-1].date).sort((a,b) => a.totalScore - b.totalScore);
        const total = latest.length * selectedFee;
        document.getElementById('prizeSection').style.display = 'block';
        document.getElementById('prizeWinners').innerHTML = `<div style="text-align:center; font-weight:bold; margin-bottom:10px;">총 상금: ${total.toLocaleString()}원</div>` + 
            latest.map((p, i) => `<div class="prize-item"><div>${i+1}등 ${p.name}</div><div>${i==0?Math.floor(total*0.5/5000)*5000:i==1?Math.floor(total*0.3/5000)*5000:i==2?Math.floor(total*0.2/5000)*5000:0}원</div></div>`).join('');
        
        // 드롭다운 업데이트
        const select = document.getElementById('historyNameSelect');
        Object.keys(globalStats).sort().forEach(n => select.add(new Option(n, n)));
    }

    function renderUserHistory() {
        const name = document.getElementById('historyNameSelect').value;
        if(!name) return;
        document.querySelector('#historyTable tbody').innerHTML = globalStats[name].history.map(r => `<tr><td>${r.date}</td><td>${r.overPar}</td><td>${r.totalScore}타</td></tr>`).join('');
        document.getElementById('historyContent').style.display = 'block';
    }

    fetchData();
</script>
</body>
</html>
