<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>어쩌다 스크린 골프 모임</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f8; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2, h3 { margin-top: 0; color: #1a365d; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; }
        th { background-color: #f8fafc; font-weight: bold; color: #4a5568; }
        .prize-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="prizeSection" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0;">💰 상금전 결과</h3>
            <select id="feeSelect" onchange="renderUI()">
                <option value="5000">5천원</option>
                <option value="10000" selected>1만원</option>
            </select>
        </div>
        <div id="prizeWinners" style="margin-top:10px;"></div>
    </div>

    <div class="card">
        <h2>🏆 스크린 골프 랭킹</h2>
        <table id="rankingTable"><thead><tr><th>순위</th><th>이름</th><th>평균타수</th></tr></thead><tbody></tbody></table>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPc5vmxIbF91Tq-sHJU0OAm52uM5gezsNv2iUyU_776aEwnZjYakpbhn8hHl696Q19EiD8CD0xvPYu/pub?output=csv';
    let records = [];
    let globalStats = {};

    async function fetchData() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n');
            const headers = rows[0].split(',').map(h => h.trim());
            
            // ★ 헤더 인덱스 찾기 (실수 방지를 위해 철저히 체크)
            const nIdx = headers.findIndex(h => h.includes('이름'));
            const sIdx = headers.findIndex(h => h.includes('타수'));
            const dIdx = headers.findIndex(h => h.includes('날짜'));

            records = [];
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',');
                if (cols.length < 3) continue;
                
                const name = cols[nIdx]?.trim();
                const score = parseInt(cols[sIdx]?.trim());
                const date = cols[dIdx]?.trim();
                
                if (name && !isNaN(score)) {
                    records.push({ date, name, score });
                }
            }
            processStats();
            renderUI();
        } catch (e) { alert("데이터 로딩 오류: " + e.message); }
    }

    function processStats() {
        globalStats = {};
        records.forEach(r => {
            if (!globalStats[r.name]) globalStats[r.name] = { total: 0, count: 0 };
            globalStats[r.name].total += r.score;
            globalStats[r.name].count += 1;
        });
    }

    function renderUI() {
        const fee = parseInt(document.getElementById('feeSelect').value);
        
        // 랭킹 렌더링
        const tbody = document.querySelector('#rankingTable tbody');
        tbody.innerHTML = Object.keys(globalStats)
            .sort((a,b) => (globalStats[a].total/globalStats[a].count) - (globalStats[b].total/globalStats[b].count))
            .map((n, i) => `<tr><td>${i+1}등</td><td>${n}</td><td>${Math.round(globalStats[n].total/globalStats[n].count)}타</td></tr>`).join('');
        
        // 상금 계산
        const latestDate = [...new Set(records.map(r => r.date))].pop();
        const latest = records.filter(r => r.date === latestDate).sort((a,b) => a.score - b.score);
        const total = latest.length * fee;
        
        document.getElementById('prizeSection').style.display = 'block';
        document.getElementById('prizeWinners').innerHTML = `<div style="text-align:center; font-weight:bold; margin-bottom:10px;">참가자 ${latest.length}명 / 총 상금: ${total.toLocaleString()}원</div>` + 
            latest.map((p, i) => {
                let money = calculatePrize(i, latest.length, fee);
                return `<div class="prize-item"><div>${i+1}등 ${p.name}</div><div>${money.toLocaleString()}원</div></div>`;
            }).join('');
    }

    function calculatePrize(rank, count, fee) {
        // 3등은 무조건 참가비
        if (rank === 2 && count >= 3) return fee;
        
        // 1등 50% 수준, 2등 나머지 (나머지 인원 제외)
        if (rank === 0) return Math.floor((count * fee * 0.5) / 5000) * 5000;
        if (rank === 1) return Math.floor((count * fee * 0.3) / 5000) * 5000;
        return 0;
    }

    fetchData();
</script>
</body>
</html>
